<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生物结皮知多少</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">
    <div id="game" style="width:1280px;height:720px;">

      <!-- Decorative border corners -->
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <!-- Header bar -->
      <div id="header">
        <div id="title-text">生物结皮知多少</div>
        <div id="scene-indicator">
          <span class="dot active" id="dot-0"></span>
          <span class="dot" id="dot-1"></span>
        </div>
        <div id="score-display">Score: <span id="score">0</span></div>
      </div>

      <!-- Scene area -->
      <div id="scene-area">
        <img id="scene-bg" src="" alt="scene background" />

        <!-- Scene elements positioned absolutely -->
        <div id="scene-elements">
          <!-- Element slots filled dynamically by game.js -->
        </div>

        <!-- Multiple missing slots (the puzzle gaps) -->
        <div id="slots-container">
          <div id="slot-1" class="slot-glow answer-slot" data-slot="1">
            <div class="slot-inner"><span class="slot-hint">1</span></div>
          </div>
          <div id="slot-2" class="slot-glow answer-slot" data-slot="2">
            <div class="slot-inner"><span class="slot-hint">2</span></div>
          </div>
          <div id="slot-3" class="slot-glow answer-slot" data-slot="3">
            <div class="slot-inner"><span class="slot-hint">3</span></div>
          </div>
        </div>

        <!-- Instruction overlay -->
        <div id="instruction-banner">
          <span id="instruction-text">Which seed grows this crop?</span>
        </div>
      </div>

      <!-- Seed tray -->
      <div id="seed-tray">
        <div id="tray-label">请选择你的答案</div>
        <div id="seed-options">
          <!-- Seed cards injected by game.js -->
        </div>
      </div>

      <!-- Feedback overlay -->
      <div id="feedback-overlay" class="hidden">
        <div id="feedback-box">
          <div id="feedback-icon"></div>
          <div id="feedback-msg"></div>
        </div>
      </div>

      <!-- End screen -->
      <div id="end-screen" class="hidden">
        <div id="end-content">
          <div id="end-title">挑战完成！</div>
          <div id="end-subtitle">你已经掌握了生物土壤结皮一点基础概念</div>
          <div id="end-score">最终得分: <span id="final-score">0</span></div>
          <button id="play-again-btn">再玩一次</button>
        </div>
      </div>

    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
